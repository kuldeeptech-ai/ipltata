<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">

<title>Live Stream</title>

<script src="//content.jwplatform.com/libraries/SAHhwvZq.js"></script>

<style>

html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
}

/* FULL PAGE CENTER */
#main {
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* PLAYER BOX */
#player-box {
    position: relative;
    width: 100%;
    height: 100%;
}

/* PLAYER */
#player {
    width: 100%;
    height: 100%;
}

/* THUMBNAIL */
#thumb {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 10;
    cursor: pointer;
}

</style>

</head>

<body>

<div id="main">

    <div id="player-box">

        <!-- THUMBNAIL -->
        <img 
            id="thumb"
            src="https://i.ibb.co/wNL7MdNS/1000329055.png"
        >

        <!-- PLAYER -->
        <div id="player"></div>

    </div>

</div>

<script>

jwplayer.key = 'YOUR_JW_PLAYER_KEY';

(function() {

    const origOpen = XMLHttpRequest.prototype.open;

    XMLHttpRequest.prototype.open = function(method, url) {

        if (url && !url.includes("__hdnea__")) {

            url += (url.includes('?') ? '&' : '?') +
            "__hdnea__=st=1778504875~exp=1778526475~acl=/bpk-tv/Star_Sports_HD1_Hindi_BTS/WDVLive/*~hmac=f5db49dfa72dd2e5ba61c1216fc9e057eda2f357c710728dfc834008bd97b147";

        }

        return origOpen.apply(this, arguments);

    };

})();

const player = jwplayer("player").setup({

    playlist: [{

        file: "https://jiotvpllive.cdn.jio.com/bpk-tv/Star_Sports_HD1_Hindi_BTS/WDVLive/index.mpd?__hdnea__=st=1778504875~exp=1778526475~acl=/bpk-tv/Star_Sports_HD1_Hindi_BTS/WDVLive/*~hmac=f5db49dfa72dd2e5ba61c1216fc9e057eda2f357c710728dfc834008bd97b147",

        drm: {

            clearkey: {

                keyId: "400131994b445d8c8817202248760fda",

                key: "2d56cb6f07a75b9aff165d534ae2bfc4"

            }

        }

    }],

    width: "100%",
    height: "100%",
    aspectratio: "16:9",
    stretching: "uniform",
    autostart: false,
    controls: true,
    fullscreen: true

});

/* CLICK THUMBNAIL TO PLAY */

document.getElementById("thumb").addEventListener("click", function() {

    this.style.display = "none";

    player.play();

});

/* SHOW THUMBNAIL ON PAUSE */

player.on("pause", function() {

    document.getElementById("thumb").style.display = "block";

});

/* HIDE THUMBNAIL WHEN PLAYING */

player.on("play", function() {

    document.getElementById("thumb").style.display = "none";

});

/* ERROR */

player.on("error", e => {

    document.body.innerHTML = `
    <div style="
        color:white;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        background:black;
        font-size:20px;
    ">
        Stream Error (${e.code})
    </div>`;

});

</script>

</body>
</html>
