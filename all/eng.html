<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">

<title>Live Stream</title>

<script src="//content.jwplatform.com/libraries/SAHhwvZq.js"></script>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
}

/* FULL PAGE CENTER */
#main {
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* 16:9 BOX */
#player-box {
    position: relative;
    width: 100%;
    height: 100%;
    max-width: 100vw;
    max-height: 100vh;
}

/* Maintain 16:9 */
#player-box::before {
    content: "";
    display: block;
    padding-top: 56.25%;
}

#player-container {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
}

#player {
    width: 100% !important;
    height: 100% !important;
}
</style>

</head>

<body>

<div id="main">
    <div id="player-box">
        <div id="player-container">
            <div id="player"></div>
        </div>
    </div>
</div>

<script>
jwplayer.key = "YOUR_JW_PLAYER_KEY";

/* =========================
   CUSTOM THUMBNAIL
========================= */
const DEMO_THUMB =
"https://plain-apac-prod-public.komododecks.com/202605/15/BBmtvaRJgaiPJkb68zIS/image.jpg";

/* =========================
   CUSTOM CIRCLE LOGO
========================= */
const DEMO_LOGO =
"https://plain-apac-prod-public.komododecks.com/202605/15/n37lRAW4k538Hu2b6abv/image.png";


document.addEventListener("DOMContentLoaded", () => {

/* =========================
   CHROME CHECK
========================= */
const isChrome =
/Chrome/.test(navigator.userAgent) &&
/Google Inc/.test(navigator.vendor);

if(!isChrome){

    document.body.innerHTML = `
    <div style="
        background:#000;
        color:#fff;
        width:100%;
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        font-family:Arial;
        text-align:center;
        padding:20px;
        box-sizing:border-box;
    ">
        Please Open In Chrome Browser
    </div>`;

    return;
}


/* =========================
   AUTO TOKEN APPEND
========================= */
(function () {

    const TOKEN =
    "__hdnea__=st=1778935189~exp=1778956789~acl=/bpk-tv/Star_Sports_HD1_Hindi_BTS/WDVLive/*~hmac=b03a774a1e13127026b4c45efb2bc891c1707f219e0e77a37ad28ba3b2b79256";

    const origOpen =
    XMLHttpRequest.prototype.open;

    XMLHttpRequest.prototype.open =
    function(method, url) {

        try{

            if(
                typeof url === "string" &&
                url.includes("bpk-tv") &&
                !url.includes("__hdnea__")
            ){

                url +=
                (url.includes("?") ? "&" : "?") +
                TOKEN;

                arguments[1] = url;
            }

        }catch(e){}

        return origOpen.apply(this, arguments);

    };

})();


/* =========================
   PLAYER SETUP
========================= */
const player = jwplayer("player").setup({

    playlist:[{

        file:
        "https://jiotvpllive.cdn.jio.com/bpk-tv/Star_Sports_HD1_Hindi_BTS/WDVLive/index.mpd?__hdnea__=st=1778935189~exp=1778956789~acl=/bpk-tv/Star_Sports_HD1_Hindi_BTS/WDVLive/*~hmac=b03a774a1e13127026b4c45efb2bc891c1707f219e0e77a37ad28ba3b2b79256",

        image: DEMO_THUMB,

        drm:{
            clearkey:{
                keyId:
                "400131994b445d8c8817202248760fda",

                key:
                "2d56cb6f07a75b9aff165d534ae2bfc4"
            }
        }

    }],

    width: "100%",
    height: "100%",

    aspectratio: "16:9",

    stretching: "uniform",

    autostart: false,

    controls: true,

    fullscreen: true,

    preload: "metadata",

    playbackRateControls: true

});


/* =========================
   PLAYER READY
========================= */
player.on('ready', function () {

    let stretchModes = [
        "uniform",
        "fill",
        "exactfit",
        "none"
    ];

    let current = 0;


    /* =========================
       CUSTOM STRETCH BUTTON
    ========================= */
    player.addButton(

        "https://plain-apac-prod-public.komododecks.com/202605/15/JrbwHym1y6mzCaC2awsH/image.jpg",

        "Stretch Mode",

        function () {

            current++;

            if(current >= stretchModes.length){
                current = 0;
            }

            const mode =
            stretchModes[current];

            player.setConfig({
                stretching: mode
            });

        },

        "stretch-button"

    );


    /* =========================
       CUSTOM LOGO
    ========================= */
    const logo =
    document.createElement("img");

    logo.src = DEMO_LOGO;

    logo.id = "custom-logo";

    logo.style.position = "absolute";

    logo.style.top = "15px";

    logo.style.left = "15px";

    logo.style.width = "80px";

    logo.style.height = "80px";

    logo.style.objectFit = "contain";

    logo.style.borderRadius = "50%";

    logo.style.zIndex = "999999";

    logo.style.pointerEvents = "none";

    logo.style.transition = "0.3s ease";

    player.getContainer().appendChild(logo);

});


/* =========================
   PAUSE EVENT
========================= */
player.on("pause", function(){

    const container =
    player.getContainer();

    container.classList.add(
        "jw-user-active"
    );


    /* =========================
       SHOW THUMB
    ========================= */
    let overlay =
    document.getElementById(
        "pause-thumb"
    );

    if(!overlay){

        overlay =
        document.createElement("div");

        overlay.id =
        "pause-thumb";

        overlay.style.position =
        "absolute";

        overlay.style.top =
        "0";

        overlay.style.left =
        "0";

        overlay.style.width =
        "100%";

        overlay.style.height =
        "100%";

        overlay.style.backgroundImage =
        `url(${DEMO_THUMB})`;

        overlay.style.backgroundPosition =
        "center";

        overlay.style.backgroundRepeat =
        "no-repeat";

        overlay.style.backgroundSize =
        "contain";

        overlay.style.backgroundColor =
        "#000";

        overlay.style.zIndex =
        "1";

        overlay.style.pointerEvents =
        "none";

        container.appendChild(overlay);

    }

    overlay.style.display =
    "block";


    /* =========================
       FORCE CONTROLS
    ========================= */
    const controls =
    container.querySelector(
        ".jw-controls"
    );

    if(controls){

        controls.style.display =
        "flex";

        controls.style.opacity =
        "1";

        controls.style.visibility =
        "visible";

        controls.style.zIndex =
        "99999";

    }


    /* =========================
       FIX PLAY/PAUSE BUTTON
    ========================= */
    const playButton =
    container.querySelector(
        '.jw-icon-playback'
    );

    if(playButton){

        playButton.style.display =
        "flex";

        playButton.style.opacity =
        "1";

        playButton.style.visibility =
        "visible";

    }


    /* CENTER BUTTON */
    const displayIcon =
    container.querySelector(
        ".jw-display"
    );

    if(displayIcon){

        displayIcon.style.opacity =
        "1";

        displayIcon.style.visibility =
        "visible";

        displayIcon.style.zIndex =
        "99999";

    }

});


/* =========================
   PLAY EVENT
========================= */
player.on("play", function(){

    const overlay =
    document.getElementById(
        "pause-thumb"
    );

    if(overlay){

        overlay.style.display =
        "none";

    }


    const container =
    player.getContainer();

    container.classList.remove(
        "jw-user-active"
    );


    /* HIDE CENTER BUTTON */
    const displayIcon =
    container.querySelector(
        ".jw-display"
    );

    if(displayIcon){

        displayIcon.style.opacity =
        "0";

        displayIcon.style.visibility =
        "hidden";

    }

});


/* =========================
   ERROR HANDLER
========================= */
player.on("error", e => {

    document.body.innerHTML = `
    <div style="
        color:white;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        background:#000;
        font-family:Arial;
        font-size:20px;
    ">
        Stream Error (${e.code})
    </div>`;

});

});
</script>

</body>
</html>
