<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">

<title>Live Stream</title>

<script src="//content.jwplatform.com/libraries/SAHhwvZq.js"></script>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
}

/* FULL PAGE CENTER */
#main {
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* 16:9 BOX */
#player-box {
    position: relative;
    width: 100%;
    height: 100%;
    max-width: 100vw;
    max-height: 100vh;
}

/* Maintain 16:9 */
#player-box::before {
    content: "";
    display: block;
    padding-top: 56.25%;
}

#player-container {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
}

#player {
    width: 100% !important;
    height: 100% !important;
}
</style>

</head>

<body>

<div id="main">
    <div id="player-box">
        <div id="player-container">
            <div id="player"></div>
        </div>
    </div>
</div>

<script>


        

        
jwplayer.key = "YOUR_JWPLAYER_KEY";

/* START STREAM */

function startStream(){

    document.getElementById("popup").classList.add("hide");

    document.getElementById("player-container").style.display = "block";

}

/* JW PLAYER */

const player = jwplayer("player").setup({

    playlist:[{

        file:"https://dck1-fs-live.dtcdn.dazn.com/out/v1/814bffb9b389f652/3bef222785684b458a800836ac836063/index.mpd",

        drm:{
            clearkey:{
                keyId:"2233b72332765f888a43983a98deec5c",
                key:"2cc1b1862998c1f22190121c36149a7f"
            }
        }

    }],


    width: "100%",
    height: "100%",
    aspectratio: "16:9",
    stretching: "uniform",
    autostart: true,
    controls: true,
    fullscreen: true
}).on("error", e => {
    document.body.innerHTML = `<div style="color:white;display:flex;justify-content:center;align-items:center;height:100vh;">Stream Error (${e.code})</div>`;
});

</script>

</body>
</html>
