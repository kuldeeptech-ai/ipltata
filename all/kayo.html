<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JW Player Live</title>

<script src="https://content.jwplatform.com/libraries/SAHhwvZq.js"></script>

<style>

html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    background:#000;
    overflow:hidden;
}

#player{
    width:100% !important;
    height:100% !important;
}

.jwplayer{
    width:100% !important;
    height:100% !important;
}

</style>

</head>

<body>

<div id="player"></div>

<script>

// JW PLAYER KEY
jwplayer.key = "YOUR_JWPLAYER_KEY";

// PLAYER SETUP
jwplayer("player").setup({

    playlist: [{

        title: "LIVE STREAM",

        file: "https://dck1-ac-live.cdn.indazn.com/out/v1/814bffb9b389f652/0fb45955afd944b19d988688141c0da3/index.mpd",

        drm: {

            clearkey: {

                keyId: "c18e0a678b70572ca99f9efe1f297f5a",

                key: "ddf3933d1fbc8c5d1f84870c3b56a22c"

            }

        }

    }],

    width: "100%",
    height: "100%",

    aspectratio: "16:9",

    stretching: "uniform",

    autostart: true,

    controls: true,

    fullscreen: true,

    primary: "html5",

    preload: "auto"

})

.on("ready", function () {

    console.log("The video has now been loaded!");

})

.on("error", function (e) {

    console.error("Error:", e);

    document.body.innerHTML = `
    <div style="
        color:white;
        background:black;
        width:100%;
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        font-size:22px;
        font-family:sans-serif;
    ">
        Stream Error
    </div>`;

});

</script>

<script>

// ANTI IFRAME
if (window.top !== window.self) {

    window.addEventListener('DOMContentLoaded', function() {

        document.body.innerHTML = `
        <div style="
            color:white;
            background:black;
            width:100%;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:24px;
            font-family:sans-serif;
        ">
            Ab to copy mat kat chutiye
        </div>`;

    });

}

</script>

</body>
</html>
