<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>JW PLAYER LIVE</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.6/controls.min.css"/>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    background:#000;
    overflow:hidden;
    font-family:Arial,sans-serif;
}

#player-container{
    width:100%;
    height:100%;
    position:relative;
}

#jwplayerDiv{
    width:100%;
    height:100%;
}

.hide{
    display:none;
}

#popup{
    position:fixed;
    inset:0;
    background:#000;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:9999;
}

#popup button{
    padding:14px 35px;
    border:none;
    border-radius:10px;
    background:#e50914;
    color:#fff;
    font-size:18px;
    cursor:pointer;
    font-weight:bold;
}

#message{
    position:fixed;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#000;
    color:#fff;
    font-size:24px;
    z-index:99999;
}
</style>
</head>

<body>

<div id="popup">
    <button onclick="startStream()">PLAY STREAM</button>
</div>

<div id="player-container" class="hide">
    <div id="jwplayerDiv"></div>
</div>

<script src="https://cdn.jwplayer.com/libraries/KB5zFt7A.js"></script>

<script>

function startStream() {
    document.getElementById("popup").classList.add("hide");
    document.getElementById("player-container").classList.remove("hide");
    initPlayer();
}

function initPlayer(){

    jwplayer("jwplayerDiv").setup({

        playlist: [{
            image: "#",
            sources: [{
                file: "https://dck1-ac-live.cdn.indazn.com/out/v1/814bffb9b389f652/0fb45955afd944b19d988688141c0da3/index.mpd",

                drm: {
                    clearkey: {
                        keyId: "c18e0a678b70572ca99f9efe1f297f5a",
                        key: "ddf3933d1fbc8c5d1f84870c3b56a22c"
                    }
                }
            }]
        }],

        width: "100%",
        height: "100%",
        aspectratio: "16:9",
        stretching: "uniform",

        autostart: true,
        mute: false,
        controls: true,
        fullscreen: true,

        primary: "html5",

        playbackRateControls: true,

        cast: {},

        skin: {
            name: "seven"
        }
    });

}

</script>



</body>
</html>
