<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Live Stream</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      font-family: sans-serif;
      overflow-x: hidden;
    }

    .video-container {
      position: relative;
      width: 100%;
      padding-top: 56.25%; /* 16:9 Aspect Ratio */
      background: #000;
    }

    .video-container iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    .jiotv-container {
      width: 100%;
      height: 90vh;
    }

    .jiotv-container iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Landscape Mode Styling on Mobile */
    .landscape-mode {
      transform: rotate(90deg);
      transform-origin: center center;
      position: fixed;
      width: 100vh;
      height: 100vw;
      top: 0;
      left: 0;
      z-index: 9999;
      overflow: hidden;
      background: #000;
    }

    .landscape-mode .video-container {
      padding-top: 100%; /* Landscape full height */
    }

    .landscape-mode .jiotv-container {
      display: none;
    }

    @media (min-width: 768px) {
      /* Disable rotation effect on desktop */
      .landscape-mode {
        transform: none !important;
        position: static !important;
        width: 100% !important;
        height: auto !important;
      }
    }
    .jio-wrap{
    position:relative;
    width:100%;
    height:500px;
    overflow:hidden;
    border-radius:16px;
}

#jioFrame{
    width:100%;
    height:100%;
    border:none;
}

/* LEFT BOTTOM LOGO */

.hide-bottom-left{
    position:absolute;
    bottom:0;
    left:0;

    width:320px;
    height:05px;

    background:#000;

    z-index:9999;
}

/* RIGHT BOTTOM LOGO */

.hide-bottom-right{
    position:absolute;
    bottom:0;
    right:0;

    width:180px;
    height:05px;

    background:#000;

    z-index:9999;
}
  </style>
</head>
<body>

  <div id="main-wrapper">
    <!-- Vimeo Live Video -->
    <div class="video-container">
        <iframe 
    src="https://crickld20267.netlify.app/str1"
    sandbox="allow-scripts allow-same-origin allow-forms allow-presentation"
    allow="autoplay; encrypted-media"
    allowfullscreen>
        </iframe>
    </div>

    <!-- JioTV Widget -->
<div class="jio-wrap">

    <iframe
    id="jioFrame"
    allowfullscreen
    webkitallowfullscreen
    mozallowfullscreen
    allow="autoplay">
    </iframe>

    <!-- BOTTOM LEFT HIDE -->
    <div class="hide-bottom-left"></div>

    <!-- BOTTOM RIGHT HIDE -->
    <div class="hide-bottom-right"></div>

</div>
  </div>

  <script>
    function handleOrientationChange() {
      const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
      const isLandscape = window.innerWidth > window.innerHeight;

      const wrapper = document.getElementById('main-wrapper');

      if (isMobile && isLandscape) {
        wrapper.classList.add('landscape-mode');
      } else {
        wrapper.classList.remove('landscape-mode');
      }
    }

    window.addEventListener('resize', handleOrientationChange);
    window.addEventListener('orientationchange', handleOrientationChange);
    document.addEventListener('DOMContentLoaded', handleOrientationChange);
  </script>
<script>

const encoded =
"aHR0cHM6Ly93aWRnZXQuamlvbmV3cy5jb20vamlvdHYtY3JpY2tldC9wcm9kL3YxL2luZGV4Lmh0bWw/dGhlbWU9ZGFyayZpc21vYmlsZT10cnVl";

document
.getElementById("jioFrame")
.src = atob(encoded);

</script>
</body>
</html>
