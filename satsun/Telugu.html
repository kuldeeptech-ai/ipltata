<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">

<title>Live Stream</title>

<script src="//content.jwplatform.com/libraries/SAHhwvZq.js"></script>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
}

/* FULL PAGE CENTER */
#main {
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* 16:9 BOX */
#player-box {
    position: relative;
    width: 100%;
    height: 100%;
    max-width: 100vw;
    max-height: 100vh;
}

/* Maintain 16:9 */
#player-box::before {
    content: "";
    display: block;
    padding-top: 56.25%;
}

#player-container {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
}

#player {
    width: 100% !important;
    height: 100% !important;
}
</style>

</head>

<body>

<div id="main">
    <div id="player-box">
        <div id="player-container">
            <div id="player"></div>
        </div>
    </div>
</div>

<script>


        

        jwplayer.key = 'YOUR_JW_PLAYER_KEY'; // IMPORTANT: Replace with your actual key

        (function() {

            const origOpen = XMLHttpRequest.prototype.open;

            XMLHttpRequest.prototype.open = function(method, url) {

                if (url && !url.includes("__hdnea__")) {

                    url += (url.includes('?') ? '&' : '?') + "__hdnea__=st=1778401150~exp=1778422750~acl=/bpk-tv/Star_Sports_HD2_BTS/WDVLive/*~hmac=af37f2cc367391b5d50a3b09a83a479afe7126eadbde6558ac29ad1735f39a9d";

                }

                return origOpen.apply(this, arguments);

            };

        })();

        jwplayer("player").setup({

            playlist: [{

                file: "https://jiotvpllive.cdn.jio.com/bpk-tv/Star_Sports_HD2_BTS/WDVLive/index.mpd?__hdnea__=st=1778401150~exp=1778422750~acl=/bpk-tv/Star_Sports_HD2_BTS/WDVLive/*~hmac=af37f2cc367391b5d50a3b09a83a479afe7126eadbde6558ac29ad1735f39a9d",

                drm: {

                    clearkey: {

                        keyId: "9457eb90129456fa8ea95e10ba4ac51e",

                        key: "e620a970cea474c491ac78ae71a4d764"

                    }

                }

            }],
    width: "100%",
    height: "100%",
    aspectratio: "16:9",
    stretching: "uniform",
    autostart: true,
    controls: true,
    fullscreen: true
}).on("error", e => {
    document.body.innerHTML = `<div style="color:white;display:flex;justify-content:center;align-items:center;height:100vh;">Stream Error (${e.code})</div>`;
});

</script>

</body>
</html>
