<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">

<title>Live Stream</title>

<script src="//content.jwplatform.com/libraries/SAHhwvZq.js"></script>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
}

/* FULL PAGE CENTER */
#main {
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* 16:9 BOX */
#player-box {
    position: relative;
    width: 100%;
    height: 100%;
    max-width: 100vw;
    max-height: 100vh;
}

/* Maintain 16:9 */
#player-box::before {
    content: "";
    display: block;
    padding-top: 56.25%;
}

#player-container {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
}

#player {
    width: 100% !important;
    height: 100% !important;
}
</style>

</head>

<body>

<div id="main">
    <div id="player-box">
        <div id="player-container">
            <div id="player"></div>
        </div>
    </div>
</div>

<script>


        

        jwplayer.key = 'YOUR_JW_PLAYER_KEY'; // IMPORTANT: Replace with your actual key

        (function() {

            const origOpen = XMLHttpRequest.prototype.open;

            XMLHttpRequest.prototype.open = function(method, url) {

                if (url && !url.includes("__hdnea__")) {

                    url += (url.includes('?') ? '&' : '?') + "__hdnea__=st=1778397353~exp=1778418953~acl=/bpk-tv/Star_Sports2_Telugu_HD_BTS/WDVLive/*~hmac=c0c278bed6428e7a5d1faf794e27fdc279b24b728be04453a4635c02d0c1be19";

                }

                return origOpen.apply(this, arguments);

            };

        })();

        jwplayer("player").setup({

            playlist: [{

                file: "https://jiotvpllive.cdn.jio.com/bpk-tv/Star_Sports2_Telugu_HD_BTS/WDVLive/index.mpd?__hdnea__=st=1778397353~exp=1778418953~acl=/bpk-tv/Star_Sports2_Telugu_HD_BTS/WDVLive/*~hmac=c0c278bed6428e7a5d1faf794e27fdc279b24b728be04453a4635c02d0c1be19",

                drm: {

                    clearkey: {

                        keyId: "c8a2fb190fc957c1b8333af9a7a39d31",

                        key: "be7497b59d4ce9e33d29bfd1d38bad1d"

                    }

                }

            }],

    width: "100%",
    height: "100%",
    aspectratio: "16:9",
    stretching: "uniform",
    autostart: true,
    controls: true,
    fullscreen: true
}).on("error", e => {
    document.body.innerHTML = `<div style="color:white;display:flex;justify-content:center;align-items:center;height:100vh;">Stream Error (${e.code})</div>`;
});

</script>

</body>
</html>
