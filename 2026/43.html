<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">

<title>Player</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
background:#000;
overflow:hidden;
font-family:sans-serif;
}

.shaka-video-container{
position:fixed;
inset:0;
background:#000;
display:flex;
align-items:center;
justify-content:center;
}

video{
width:100%;
height:100%;
object-fit:contain;
background:#000;
}

#errorBox{
position:fixed;
top:10px;
left:10px;
right:10px;
z-index:9999;
background:#111;
color:#fff;
padding:10px;
font-size:12px;
display:none;
border-radius:6px;
word-break:break-word;
}

</style>
</head>

<body>

<div id="errorBox"></div>

<div
class="shaka-video-container"
id="player-container">

<video
id="video"
autoplay
muted
playsinline
preload="auto">
</video>

</div>

<script>

/* =========================
   WORKER
========================= */

const WORKER =
"https://lingering-pine-9ae9.kuldeeprai75220.workers.dev/?url=";

/* =========================
   URLS
========================= */

const CHANNELS_URL =
WORKER +
encodeURIComponent(
"https://allinonereborn.online/jtv-fetch/jstr4web.json"
);

const COOKIE_PRIMARY =
WORKER +
encodeURIComponent(
"https://allinonereborn.online/jstrweb2/cookies.json"
);

const COOKIE_STAR_SPORTS =
WORKER +
encodeURIComponent(
"https://allinonereborn.online/jtv-fetch/jstarcookie/cookie.json"
);

/* =========================
   FETCH OPTIONS
========================= */

const FETCH_OPTIONS = {

method:"GET",

mode:"cors",

credentials:"omit",

cache:"no-store"

};

/* =========================
   ERROR
========================= */

function showError(msg){

console.log(msg);

const box =
document.getElementById("errorBox");

box.style.display = "block";

box.innerHTML = msg;

}

   player.addEventListener("error", (event) => {
  console.log("PLAYER ERROR:", event.detail);
  alert(JSON.stringify(event.detail));
});
/* =========================
   FETCH JSON
========================= */

async function fetchJSON(url){

const res =
await fetch(url,FETCH_OPTIONS);

if(!res.ok){

throw new Error(
"Fetch failed"
);

}

return await res.json();

}

/* =========================
   CONFIG
========================= */

async function fetchConfig(){

try{

const params =
new URLSearchParams(
location.search
);

const channelId =
params.get("id");

if(!channelId){

showError("Missing id");

return null;

}

const channelList =
await fetchJSON(CHANNELS_URL);

const channelData =
channelList.find(
c =>
String(c.id) ===
String(channelId)
);

if(!channelData){

showError("Channel not found");

return null;

}

/* =========================
   COOKIE
========================= */

let primaryCookie = "";

try{

const cookieData =
await fetchJSON(
COOKIE_STAR_SPORTS
);

if(
cookieData &&
cookieData.failed_results
){

const entry =
cookieData.failed_results.find(
x =>
String(x.channel_id) ===
String(channelId)
);

if(
entry &&
entry.error_details &&
entry.error_details.final_url
){

const match =
entry.error_details.final_url.match(
/__hdnea__=([^&]+)/
);

if(match){

primaryCookie =
"__hdnea__=" +
match[1];

}

}

}

}catch(e){
  console.log("LOAD ERROR:", e);
  alert(JSON.stringify(e));
}

}

/* =========================
   FALLBACK COOKIE
========================= */

if(!primaryCookie){

try{

const fallback =
await fetchJSON(
COOKIE_PRIMARY
);

if(Array.isArray(fallback)){

const item =
fallback.find(
x => x.cookie
);

if(item){

primaryCookie =
item.cookie;

}

}

}catch(e){

console.log(e);

}

}

/* =========================
   STREAMS
========================= */

const streamUrls = [

channelData.url,
channelData.url1,
channelData.url2,
channelData.url3

]
.filter(Boolean)
.map(
u =>
u.replace(
"bpk-tv//",
"bpk-tv/"
)
);

return {

channelData,
streamUrls,
primaryCookie

};

}catch(e){

showError(
"Config Error: " +
e
);

return null;

}

}

/* =========================
   MAIN
========================= */

document.addEventListener(
"DOMContentLoaded",
async ()=>{

try{

const cfg =
await fetchConfig();

if(!cfg) return;

const {

channelData,
streamUrls,
primaryCookie

} = cfg;

/* =========================
   SHAKA
========================= */

shaka.polyfill.installAll();

if(
!shaka.Player
.isBrowserSupported()
){

showError(
"Browser not supported"
);

return;

}

const video =
document.getElementById(
"video"
);

const container =
document.getElementById(
"player-container"
);

const player =
new shaka.Player();

await player.attach(video);

new shaka.ui.Overlay(
player,
container,
video
);

/* =========================
   DRM
========================= */

if(
!channelData.keyId ||
!channelData.key
){

showError(
"Missing DRM Keys"
);

return;

}

player.configure({

drm:{
clearKeys:{
[channelData.keyId]:
channelData.key
}
},

streaming:{
lowLatencyMode:true
}

});

/* =========================
   REQUEST FILTER
========================= */

player
.getNetworkingEngine()
.registerRequestFilter(
(type,request)=>{

if(
primaryCookie &&
(
type ===
shaka.net
.NetworkingEngine
.RequestType
.MANIFEST ||

type ===
shaka.net
.NetworkingEngine
.RequestType
.SEGMENT
)
){

const originalUrl =
request.uris[0];

const separator =
originalUrl.includes("?")
? "&"
: "?";

const finalUrl =
originalUrl +
separator +
primaryCookie;

request.uris[0] =
WORKER +
encodeURIComponent(
finalUrl
);

}

}
);

/* =========================
   LOAD
========================= */

let loaded = false;

for(const url of streamUrls){

try{

await player.load(
WORKER + encodeURIComponent(url)
);

await video.play();

loaded = true;

console.log(
"Playing"
);

break;

}catch(e){

console.log(e);

}

}

if(!loaded){

showError(
"All streams failed"
);

}

}catch(e){

showError(
"Fatal Error: " + e
);

}

});

</script>

</body>
</html>
