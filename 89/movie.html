<!-- movie.html -->
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Movie</title>

<link rel="stylesheet" href="style.css">

<meta property="og:type" content="video.movie">

<meta property="og:title" id="ogTitle">

<meta property="og:image" id="ogImage">

<meta property="og:description" id="ogDesc">

</head>
<body>

<section class="movie-banner" id="movieBanner">

<div class="movie-overlay"></div>

<div class="movie-banner-content">

<h1 id="movieTitle"></h1>

<div class="movie-meta">

<span id="movieRating"></span>

<span id="movieYear"></span>

<span id="movieGenre"></span>

</div>

<p id="movieDesc"></p>

</div>

</section>

<section class="player-section">

<div id="playerBox"></div>

</section>

<section class="cast-section">

<h2>Cast</h2>

<p id="movieCast"></p>

</section>

<section class="related-section">

<h2>Related Movies</h2>

<div class="related-grid" id="relatedGrid"></div>

</section>

<script src="player.js"></script>

</body>
</html>
