<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">

<title>Live Stream</title>

<script src="//content.jwplatform.com/libraries/SAHhwvZq.js"></script>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
}

/* FULL PAGE CENTER */
#main {
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* 16:9 BOX */
#player-box {
    position: relative;
    width: 100%;
    height: 100%;
    max-width: 100vw;
    max-height: 100vh;
}

/* Maintain 16:9 */
#player-box::before {
    content: "";
    display: block;
    padding-top: 56.25%;
}

#player-container {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
}

#player {
    width: 100% !important;
    height: 100% !important;
}
</style>

</head>

<body>

<div id="main">
    <div id="player-box">
        <div id="player-container">
            <div id="player"></div>
        </div>
    </div>
</div>

    <script>
jwplayer.key = "YOUR_JW_PLAYER_KEY";

/* =========================
   CUSTOM THUMBNAIL
========================= */
const DEMO_THUMB =
"https://plain-apac-prod-public.komododecks.com/202605/15/BBmtvaRJgaiPJkb68zIS/image.jpg";

/* =========================
   CUSTOM CIRCLE LOGO
========================= */
const DEMO_LOGO =
"https://plain-apac-prod-public.komododecks.com/202605/15/n37lRAW4k538Hu2b6abv/image.png";


/* =========================
   AUTO TOKEN APPEND
========================= */
(function () {

    const TOKEN =
    "__hdnea__=st=1778836785~exp=1778858385~acl=/bpk-tv/Star_Sports_HD1_Hindi_BTS/WDVLive/*~hmac=4c0ae2530772c809f8e9ae9a1ad9882aebfeb85723aa7fc001f60bca376ffd3f";

    const origOpen =
    XMLHttpRequest.prototype.open;

    XMLHttpRequest.prototype.open =
    function(method, url) {

        try{

            if(
                typeof url === "string" &&
                url.includes("bpk-tv") &&
                !url.includes("__hdnea__")
            ){

                url +=
                (url.includes("?") ? "&" : "?") +
                TOKEN;

                arguments[1] = url;
            }

        }catch(e){}

        return origOpen.apply(this, arguments);

    };

})();


/* =========================
   PLAYER SETUP
========================= */
const player = jwplayer("player").setup({

    playlist:[{

        file:
        "https://jiotvpllive.cdn.jio.com/bpk-tv/Star_Sports_HD1_Hindi_BTS/WDVLive/index.mpd?__hdnea__=st=1778836785~exp=1778858385~acl=/bpk-tv/Star_Sports_HD1_Hindi_BTS/WDVLive/*~hmac=4c0ae2530772c809f8e9ae9a1ad9882aebfeb85723aa7fc001f60bca376ffd3f",

        /* CUSTOM THUMB */
        image: DEMO_THUMB,

        drm:{
            clearkey:{
                keyId:
                "400131994b445d8c8817202248760fda",

                key:
                "2d56cb6f07a75b9aff165d534ae2bfc4"
            }
        }

    }],

    width: "100%",
    height: "100%",

    aspectratio: "16:9",

    stretching: "uniform",

    /* MANUAL PLAY */
    autostart: false,

    controls: true,

    fullscreen: true

});


/* =========================
   PLAYER READY
========================= */
player.on('ready', function () {

    let stretchModes = [
        "uniform",
        "fill",
        "exactfit",
        "none"
    ];

    let current = 0;


    /* =========================
       CUSTOM STRETCH BUTTON
    ========================= */
    player.addButton(

        "https://plain-apac-prod-public.komododecks.com/202605/15/JrbwHym1y6mzCaC2awsH/image.jpg",

        "Stretch Mode",

        function () {

            current++;

            if(current >= stretchModes.length){
                current = 0;
            }

            const mode =
            stretchModes[current];


            /* VIDEO STRETCH */
            player.setConfig({
                stretching: mode
            });


            /* START THUMB STRETCH */
            const preview =
            document.querySelector(".jw-preview");

            if(preview){

                if(mode === "fill"){

                    preview.style.backgroundSize =
                    "cover";

                }else if(mode === "exactfit"){

                    preview.style.backgroundSize =
                    "100% 100%";

                }else{

                    preview.style.backgroundSize =
                    "contain";

                }

            }


            /* PAUSE THUMB STRETCH */
            const pauseThumb =
            document.getElementById("pause-thumb");

            if(pauseThumb){

                if(mode === "fill"){

                    pauseThumb.style.backgroundSize =
                    "cover";

                }else if(mode === "exactfit"){

                    pauseThumb.style.backgroundSize =
                    "100% 100%";

                }else{

                    pauseThumb.style.backgroundSize =
                    "contain";

                }

            }


            /* LOGO STRETCH */
            const logo =
            document.getElementById("custom-logo");

            if(logo){

                if(mode === "fill"){

                    logo.style.transform =
                    "scale(1.25)";

                }else if(mode === "exactfit"){

                    logo.style.transform =
                    "scaleX(1.35) scaleY(1.05)";

                }else{

                    logo.style.transform =
                    "scale(1)";

                }

            }

        },

        "stretch-button"

    );


    /* =========================
       CUSTOM TOP LEFT LOGO
    ========================= */
    const logo =
    document.createElement("img");

    logo.src = DEMO_LOGO;

    logo.id = "custom-logo";

    logo.style.position = "absolute";

    logo.style.top = "15px";

    logo.style.left = "15px";

    logo.style.width = "70px";

    logo.style.height = "70px";

    logo.style.objectFit = "contain";

    logo.style.borderRadius = "50%";

    logo.style.zIndex = "999999";

    logo.style.pointerEvents = "none";

    logo.style.transition = "0.3s ease";

    player.getContainer().appendChild(logo);

});


/* =========================
   SHOW THUMB ON PAUSE
========================= */
player.on("pause", function(){

    const container =
    player.getContainer();

    let overlay =
    document.getElementById("pause-thumb");

    if(!overlay){

        overlay =
        document.createElement("div");

        overlay.id =
        "pause-thumb";

        overlay.style.position =
        "absolute";

        overlay.style.top =
        "0";

        overlay.style.left =
        "0";

        overlay.style.width =
        "100%";

        overlay.style.height =
        "100%";

        overlay.style.backgroundImage =
        `url(${DEMO_THUMB})`;

        overlay.style.backgroundPosition =
        "center";

        overlay.style.backgroundRepeat =
        "no-repeat";

        overlay.style.backgroundSize =
        "contain";

        overlay.style.backgroundColor =
        "#000";

        overlay.style.zIndex =
        "1";

        overlay.style.pointerEvents =
        "none";

        container.appendChild(overlay);

    }

    overlay.style.display =
    "block";


    /* SHOW CONTROLS */
    const controls =
    container.querySelector(".jw-controls");

    if(controls){

        controls.style.opacity =
        "1";

        controls.style.visibility =
        "visible";

        controls.style.display =
        "flex";

        controls.style.zIndex =
        "99999";

    }

});


/* =========================
   HIDE THUMB ON PLAY
========================= */
player.on("play", function(){

    const overlay =
    document.getElementById("pause-thumb");

    if(overlay){

        overlay.style.display =
        "none";

    }

});


/* =========================
   ERROR HANDLER
========================= */
player.on("error", e => {

    document.body.innerHTML = `
    <div style="
        color:white;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        background:#000;
        font-family:Arial;
        font-size:20px;
    ">
        Stream Error (${e.code})
    </div>`;

});
    </script>
    
</body>
</html>
